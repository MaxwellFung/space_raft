<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spaceraft Sandbox</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #00020a;
        color: #eef5ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      .hud {
        position: fixed;
        left: 16px;
        top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        max-width: calc(100vw - 32px);
        color: rgba(238, 245, 255, 0.72);
        font-size: 13px;
        pointer-events: none;
        user-select: none;
      }

      .hud strong,
      .hud span {
        border: 1px solid rgba(170, 205, 255, 0.16);
        border-radius: 6px;
        background: rgba(2, 7, 18, 0.58);
        padding: 6px 8px;
        backdrop-filter: blur(12px);
      }

      .hud strong {
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <canvas id="sandbox" aria-label="Empty starfield sandbox"></canvas>
    <div class="hud">
      <strong>Spaceraft Sandbox</strong>
      <span>WASD move</span>
      <span>Space / Shift vertical</span>
      <span>E boost</span>
      <span>Click + mouse look</span>
    </div>
    <script src="https://cdn.babylonjs.com/babylon.js"></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
