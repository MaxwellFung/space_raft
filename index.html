<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spaceraft Sandbox</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #00020a;
        color: #eef5ff;
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont,
          "Segoe UI", sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      body.menu-open canvas,
      body.menu-open .hud,
      body.menu-open .metrics,
      body.menu-open .survival-bars,
      body.menu-open .quick-access {
        visibility: hidden;
      }

      body.tooltips-hidden .hud,
      body.tooltips-hidden .metrics,
      body.tooltips-hidden .interaction-prompt {
        display: none;
      }

      .main-menu {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background-color: #02040b;
        z-index: 10;
      }

      body:not(.menu-open) .main-menu {
        display: none;
      }

      .menu-panel {
        width: min(420px, 100%);
        border: 1px solid rgba(170, 205, 255, 0.18);
        border-radius: 8px;
        background: rgba(2, 7, 18, 0.82);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.55);
        padding: 22px;
        backdrop-filter: blur(18px);
      }

      .menu-panel h1 {
        margin: 0 0 18px;
        font-size: 28px;
        font-weight: 700;
        letter-spacing: 0;
      }

      .menu-actions {
        display: grid;
        gap: 10px;
      }

      .menu-actions button,
      .save-path {
        width: 100%;
        min-height: 42px;
        border: 1px solid rgba(170, 205, 255, 0.2);
        border-radius: 6px;
        background: rgba(7, 14, 30, 0.92);
        color: #eef5ff;
        font: inherit;
      }

      .menu-actions button {
        cursor: pointer;
        font-weight: 650;
      }

      .menu-actions button.primary {
        border-color: rgba(255, 184, 84, 0.58);
        background: rgba(255, 184, 84, 0.16);
        color: #ffe1a8;
      }

      .save-path {
        padding: 0 10px;
      }

      .menu-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }

      .menu-error {
        min-height: 18px;
        margin-top: 12px;
        color: #ffb4a8;
        font-size: 13px;
      }

      .hud {
        position: fixed;
        left: 16px;
        top: 16px;
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        align-items: center;
        max-width: calc(100vw - 32px);
        color: rgba(238, 245, 255, 0.72);
        font-size: 13px;
        pointer-events: none;
        user-select: none;
      }

      .hud > strong,
      .hud > span,
      .hud button,
      .hud-slider {
        border: 1px solid rgba(170, 205, 255, 0.16);
        border-radius: 6px;
        background: rgba(2, 7, 18, 0.58);
        color: inherit;
        font: inherit;
        padding: 6px 8px;
        backdrop-filter: blur(12px);
      }

      .hud strong {
        color: #ffffff;
      }

      .hud button {
        cursor: pointer;
        pointer-events: auto;
      }

      .hud-slider {
        display: inline-grid;
        grid-template-columns: auto 96px 42px;
        gap: 7px;
        align-items: center;
        pointer-events: auto;
      }

      .hud-slider input {
        width: 96px;
        accent-color: #ffe04f;
      }

      .hud-slider-value {
        color: #ffe1a8;
        font-variant-numeric: tabular-nums;
        text-align: right;
      }

      .hud button[aria-pressed="true"] {
        border-color: rgba(255, 184, 84, 0.6);
        color: #ffe1a8;
      }

      .metrics {
        position: fixed;
        right: 16px;
        top: 16px;
        display: grid;
        grid-template-columns: repeat(3, auto);
        gap: 8px;
        color: rgba(238, 245, 255, 0.82);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        pointer-events: none;
        user-select: none;
      }

      .metrics span {
        min-width: 76px;
        border: 1px solid rgba(170, 205, 255, 0.16);
        border-radius: 6px;
        background: rgba(2, 7, 18, 0.72);
        padding: 6px 8px;
        text-align: right;
        backdrop-filter: blur(12px);
      }

      .metrics .breakdown {
        grid-column: 1 / -1;
        min-width: 310px;
        text-align: left;
      }

      .survival-bars {
        position: fixed;
        left: 16px;
        bottom: 18px;
        display: grid;
        gap: 6px;
        width: 184px;
        pointer-events: none;
        user-select: none;
      }

      .survival-meter {
        display: grid;
        grid-template-columns: 30px 1fr;
        align-items: center;
        height: 24px;
      }

      .survival-icon {
        display: grid;
        place-items: center;
        width: 30px;
        height: 24px;
        border: 1px solid rgba(174, 218, 255, 0.2);
        border-radius: 5px 0 0 5px;
        background: rgba(3, 10, 20, 0.82);
        color: rgba(238, 245, 255, 0.86);
        font-size: 12px;
        font-weight: 800;
        letter-spacing: 0;
        box-shadow: inset 0 0 18px rgba(120, 215, 255, 0.08);
      }

      .survival-track {
        height: 16px;
        border: 1px solid rgba(174, 218, 255, 0.22);
        border-left: 0;
        border-radius: 0 5px 5px 0;
        background: rgba(1, 6, 14, 0.72);
        box-shadow:
          inset 0 0 12px rgba(0, 0, 0, 0.62),
          0 0 12px rgba(0, 0, 0, 0.24);
        overflow: hidden;
      }

      .survival-fill {
        width: calc(var(--value) * 1%);
        height: 100%;
        background: linear-gradient(
          90deg,
          var(--bar-dark),
          var(--bar-light)
        );
        box-shadow: 0 0 12px var(--bar-glow);
      }

      .quick-access {
        position: fixed;
        left: 50%;
        bottom: 14px;
        display: grid;
        grid-template-columns: auto auto auto;
        gap: 6px;
        align-items: center;
        transform: translateX(-50%);
        pointer-events: none;
        user-select: none;
      }

      .quick-key {
        display: grid;
        place-items: center;
        min-width: 32px;
        height: 22px;
        border: 1px solid rgba(190, 224, 255, 0.2);
        border-radius: 4px;
        background: rgba(3, 7, 12, 0.52);
        color: rgba(224, 242, 255, 0.72);
        font-size: 10px;
        font-weight: 700;
        letter-spacing: 0;
        line-height: 1;
        pointer-events: auto;
      }

      .hotbar {
        display: grid;
        grid-template-columns: repeat(10, 38px);
        gap: 3px;
        padding: 4px;
        border: 1px solid rgba(190, 224, 255, 0.14);
        border-radius: 5px;
        background: rgba(2, 5, 10, 0.46);
        backdrop-filter: blur(10px);
        pointer-events: auto;
      }

      .item-slot {
        position: relative;
        display: grid;
        place-items: center;
        width: 38px;
        height: 38px;
        border: 1px solid rgba(190, 224, 255, 0.12);
        border-radius: 3px;
        background: rgba(7, 11, 16, 0.5);
        color: #eaf8ff;
        font-size: 11px;
        font-weight: 800;
      }

      .item-slot.selected {
        border-color: rgba(255, 190, 93, 0.78);
        background: rgba(255, 190, 93, 0.06);
      }

      .item-slot.selected::after {
        position: absolute;
        left: 5px;
        right: 5px;
        bottom: 4px;
        height: 1px;
        background: rgba(255, 190, 93, 0.92);
        content: "";
      }

      .slot-key,
      .slot-count {
        position: absolute;
        font-size: 9px;
        font-weight: 700;
        line-height: 1;
      }

      .slot-key {
        left: 5px;
        top: 5px;
        color: rgba(224, 242, 255, 0.42);
      }

      .slot-count {
        right: 5px;
        bottom: 5px;
        color: rgba(255, 216, 154, 0.86);
      }

      .interaction-prompt {
        position: fixed;
        left: 50%;
        bottom: 78px;
        min-width: 148px;
        border: 1px solid rgba(224, 242, 255, 0.16);
        border-radius: 4px;
        background: rgba(3, 7, 12, 0.62);
        color: rgba(238, 248, 255, 0.86);
        font-size: 12px;
        font-weight: 700;
        line-height: 1;
        padding: 9px 12px;
        text-align: center;
        transform: translateX(-50%);
        pointer-events: none;
        user-select: none;
      }

      .interaction-prompt[hidden] {
        display: none;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        padding: 26px;
        background: rgba(0, 5, 14, 0.38);
        backdrop-filter: blur(3px);
        z-index: 8;
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .space-modal {
        width: min(920px, calc(100vw - 32px));
        max-height: min(680px, calc(100vh - 56px));
        border: 1px solid rgba(174, 218, 255, 0.24);
        border-radius: 8px;
        background: rgba(3, 9, 18, 0.94);
        box-shadow: 0 24px 80px rgba(0, 0, 0, 0.5);
        color: #eef8ff;
        overflow: hidden;
      }

      .inventory-modal {
        display: grid;
        width: min(466px, calc(100vw - 32px));
      }

      .inventory-panel,
      .notebook-panel {
        padding: 16px;
      }

      .panel-title {
        margin: 0 0 12px;
        color: #bfeeff;
        font-size: 15px;
        font-weight: 800;
        letter-spacing: 0.08em;
        text-transform: uppercase;
      }

      .inventory-panel {
        min-width: 0;
      }

      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 38px));
        gap: 6px;
        margin-top: 12px;
      }

      .modal-hotbar {
        display: grid;
        grid-template-columns: repeat(10, minmax(0, 38px));
        gap: 6px;
      }

      .modal-hotbar .item-slot {
        width: 38px;
        height: 38px;
        font-size: 11px;
      }

      .notebook-modal {
        width: min(760px, calc(100vw - 32px));
      }

      .notebook-panel {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 16px;
      }

      .notebook-tabs {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .notebook-tab {
        min-height: 36px;
        border: 1px solid rgba(174, 218, 255, 0.14);
        border-radius: 6px;
        background: rgba(12, 24, 36, 0.72);
        color: #dcefff;
        font: inherit;
        text-align: left;
        padding: 0 10px;
        cursor: pointer;
      }

      .notebook-tab.active {
        border-color: rgba(120, 215, 255, 0.7);
        color: #bfeeff;
      }

      .notebook-page {
        min-height: 300px;
        border: 1px solid rgba(174, 218, 255, 0.12);
        border-radius: 7px;
        background: rgba(1, 5, 12, 0.46);
        padding: 16px;
      }

      .notebook-page p {
        margin: 0 0 12px;
        color: rgba(238, 248, 255, 0.72);
        line-height: 1.5;
      }

      @media (max-width: 820px) {
        .survival-bars {
          bottom: 84px;
          width: 160px;
        }

        .quick-access {
          grid-template-columns: 36px auto 36px;
          gap: 5px;
          width: calc(100vw - 20px);
        }

        .hotbar {
          grid-template-columns: repeat(10, minmax(25px, 1fr));
          width: 100%;
        }

        .item-slot {
          width: auto;
          height: 36px;
          min-width: 0;
        }

        .inventory-grid,
        .modal-hotbar {
          grid-template-columns: repeat(10, minmax(0, 1fr));
        }

        .modal-hotbar .item-slot {
          width: auto;
          height: 36px;
        }

        .metrics {
          top: auto;
          bottom: 16px;
        }

        .notebook-panel {
          grid-template-columns: 1fr;
          overflow-y: auto;
        }
      }
    </style>
  </head>
  <body class="menu-open">
    <div class="main-menu" role="dialog" aria-labelledby="menu-title">
      <section class="menu-panel">
        <h1 id="menu-title">Spaceraft</h1>
        <div class="menu-actions">
          <button id="new-game-button" class="primary" type="button">
            New Game
          </button>
          <input
            id="save-path-input"
            class="save-path"
            type="text"
            value="./saves/brown-dwarf-default.json"
            aria-label="Save path"
          />
          <div class="menu-row">
            <button id="load-save-button" type="button">Load Save</button>
            <button id="browse-save-button" type="button">Browse</button>
          </div>
          <input
            id="save-file-input"
            type="file"
            accept="application/json,.json"
            hidden
          />
        </div>
        <div id="menu-error" class="menu-error" aria-live="polite"></div>
      </section>
    </div>
    <canvas id="sandbox" aria-label="Empty starfield sandbox"></canvas>
    <div class="hud">
      <strong>Spaceraft Sandbox</strong>
      <span>WASD move</span>
      <span>Space jump</span>
      <span>Ctrl boost</span>
      <span>Click + mouse look</span>
    </div>
    <div class="survival-bars" aria-label="Survival status"></div>
    <div id="interaction-prompt" class="interaction-prompt" hidden></div>
    <div class="quick-access" aria-label="Quick access">
      <button id="inventory-key-button" class="quick-key" type="button">
        TAB
      </button>
      <div id="hotbar" class="hotbar" aria-label="Hotbar"></div>
      <button id="notebook-key-button" class="quick-key" type="button">
        T
      </button>
    </div>
    <div
      id="inventory-modal"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="inventory-title"
      hidden
    >
      <section class="space-modal inventory-modal">
        <section class="inventory-panel">
          <h2 class="panel-title">Hotbar</h2>
          <div class="modal-hotbar" aria-label="Inventory hotbar"></div>
          <h2 id="inventory-title" class="panel-title">Inventory</h2>
          <div class="inventory-grid" aria-label="Inventory grid"></div>
        </section>
      </section>
    </div>
    <div
      id="notebook-modal"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="notebook-title"
      hidden
    >
      <section class="space-modal notebook-modal">
        <div class="notebook-panel">
          <nav class="notebook-tabs" aria-label="Notebook sections"></nav>
          <section class="notebook-page">
            <h2 id="notebook-title" class="panel-title">Notebook</h2>
            <div class="notebook-copy"></div>
          </section>
        </div>
      </section>
    </div>
    <div
      class="metrics"
      title="CPU and GPU percentages show usage of a 16.7 ms frame budget"
    >
      <span id="metric-fps">FPS --</span>
      <span id="metric-cpu">CPU --</span>
      <span id="metric-gpu">GPU --</span>
      <span id="metric-cpu-breakdown" class="breakdown">CPU parts --</span>
      <span id="metric-gpu-breakdown" class="breakdown">GPU est --</span>
    </div>
    <script
      src="https://cdn.babylonjs.com/babylon.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./app.js"></script>
  </body>
</html>
