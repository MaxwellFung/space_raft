<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spaceraft Asset Sandbox</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #07090c;
        color: #edf5f7;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
      }

      body.pointer-locked canvas {
        cursor: none;
      }

      .crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 18px;
        height: 18px;
        pointer-events: none;
        opacity: 0;
        transform: translate(-50%, -50%);
      }

      .crosshair::before,
      .crosshair::after {
        position: absolute;
        content: "";
        background: rgba(237, 245, 247, 0.82);
        box-shadow: 0 0 5px rgba(58, 217, 255, 0.5);
      }

      .crosshair::before {
        left: 8px;
        top: 2px;
        width: 2px;
        height: 14px;
      }

      .crosshair::after {
        left: 2px;
        top: 8px;
        width: 14px;
        height: 2px;
      }

      body.inside-mode .crosshair {
        opacity: 1;
      }

      .panel {
        position: fixed;
        left: 14px;
        top: 14px;
        display: grid;
        gap: 10px;
        width: min(290px, calc(100vw - 28px));
        border: 1px solid rgba(178, 207, 214, 0.18);
        border-radius: 8px;
        background: rgba(8, 12, 16, 0.76);
        padding: 12px;
        backdrop-filter: blur(14px);
      }

      .panel h1 {
        margin: 0;
        font-size: 15px;
        font-weight: 650;
        letter-spacing: 0;
      }

      .toolbar,
      .stats,
      .control-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }

      button {
        min-width: 34px;
        min-height: 32px;
        border: 1px solid rgba(178, 207, 214, 0.18);
        border-radius: 6px;
        background: rgba(20, 27, 32, 0.92);
        color: inherit;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        padding: 0 9px;
      }

      button[aria-pressed="true"] {
        border-color: rgba(100, 209, 223, 0.72);
        color: #b9f7ff;
      }

      .control-row {
        display: grid;
        grid-template-columns: 74px 1fr 42px;
        gap: 8px;
      }

      .control-row label,
      .control-row output {
        color: rgba(237, 245, 247, 0.74);
        font-size: 12px;
        line-height: 28px;
      }

      input[type="range"] {
        width: 100%;
        accent-color: #72d4df;
      }

      input[type="color"] {
        width: 38px;
        height: 28px;
        border: 1px solid rgba(178, 207, 214, 0.18);
        border-radius: 6px;
        background: rgba(20, 27, 32, 0.92);
        padding: 2px;
      }

      .stats span {
        border: 1px solid rgba(178, 207, 214, 0.14);
        border-radius: 6px;
        background: rgba(16, 21, 25, 0.82);
        padding: 5px 7px;
        color: rgba(237, 245, 247, 0.74);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .material-list {
        display: grid;
        grid-template-columns: 1fr;
        gap: 4px;
        max-height: min(310px, calc(100vh - 190px));
        overflow: auto;
      }

      .material-list span {
        border-left: 3px solid var(--swatch, #8a9190);
        border-radius: 4px;
        background: rgba(16, 21, 25, 0.64);
        padding: 4px 6px;
        color: rgba(237, 245, 247, 0.78);
        font-size: 11px;
        line-height: 1.25;
      }

      .error {
        position: fixed;
        right: 14px;
        top: 14px;
        max-width: min(520px, calc(100vw - 28px));
        border: 1px solid rgba(255, 112, 112, 0.36);
        border-radius: 8px;
        background: rgba(38, 8, 8, 0.86);
        padding: 10px 12px;
        color: #ffd8d8;
        font-size: 12px;
        white-space: pre-wrap;
        backdrop-filter: blur(14px);
      }

      .perf {
        position: fixed;
        right: 14px;
        top: 14px;
        display: grid;
        gap: 4px;
        min-width: 172px;
        border: 1px solid rgba(178, 207, 214, 0.18);
        border-radius: 8px;
        background: rgba(8, 12, 16, 0.76);
        padding: 10px;
        color: rgba(237, 245, 247, 0.78);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
        backdrop-filter: blur(14px);
      }

      .perf strong {
        color: #edf5f7;
        font-size: 13px;
        font-weight: 650;
      }

      .perf div {
        display: flex;
        justify-content: space-between;
        gap: 14px;
      }
    </style>
  </head>
  <body>
    <canvas id="asset-canvas" aria-label="Spaceraft asset sandbox"></canvas>
    <div class="crosshair" aria-hidden="true"></div>
    <section class="panel">
      <h1>Asset Sandbox</h1>
      <div class="toolbar">
        <button
          id="grid-toggle"
          type="button"
          aria-pressed="false"
          title="Grid"
        >
          Grid
        </button>
        <button
          id="axes-toggle"
          type="button"
          aria-pressed="false"
          title="Axes"
        >
          Axes
        </button>
        <button id="frame-button" type="button" title="Frame">Frame</button>
        <button
          id="inside-toggle"
          type="button"
          aria-pressed="false"
          title="Stand inside"
        >
          Inside
        </button>
      </div>
      <div class="stats">
        <span>Root GLB model</span>
        <span id="mesh-count">Meshes 0</span>
      </div>
      <div class="control-row">
        <label for="walk-speed">Speed</label>
        <input
          id="walk-speed"
          type="range"
          min="1"
          max="12"
          step="0.05"
          value="1"
        />
        <output id="walk-speed-output" for="walk-speed">1.00</output>
      </div>
      <div class="stats">
        <span id="physics-status">Physics idle</span>
      </div>
      <div id="material-list" class="material-list"></div>
    </section>
    <section id="perf-stats" class="perf" aria-label="Performance stats">
      <strong>Performance</strong>
      <div><span>FPS</span><span id="perf-fps">0</span></div>
      <div><span>Frame</span><span id="perf-frame">0.0 ms</span></div>
      <div><span>CPU</span><span id="perf-cpu">0%</span></div>
      <div><span>GPU</span><span id="perf-gpu">n/a</span></div>
      <div><span>Meshes</span><span id="perf-meshes">0</span></div>
      <div><span>Triangles</span><span id="perf-tris">0</span></div>
      <div><span>Materials</span><span id="perf-materials">0</span></div>
      <div><span>Textures</span><span id="perf-textures">0</span></div>
    </section>
    <div id="runtime-error" class="error" hidden></div>
    <script
      src="https://cdn.babylonjs.com/babylon.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./src/asset-sandbox.js"></script>
  </body>
</html>
