<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Spaceraft Ship Development Studio</title>
    <style>
      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 100%;
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #eef1f4;
        color: #10151a;
        font-family:
          Inter,
          ui-sans-serif,
          system-ui,
          -apple-system,
          BlinkMacSystemFont,
          "Segoe UI",
          sans-serif;
      }

      canvas {
        display: block;
        width: 100%;
        height: 100%;
        outline: none;
      }

      body.walk-mode canvas {
        cursor: none;
      }

      .topbar {
        position: fixed;
        left: 18px;
        right: 18px;
        top: 16px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        pointer-events: none;
      }

      .brand,
      .toolbar,
      .readout,
      .asset-strip {
        border: 1px solid rgba(48, 63, 78, 0.14);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 16px 34px rgba(40, 50, 60, 0.12);
        backdrop-filter: blur(16px);
        pointer-events: auto;
      }

      .brand {
        min-width: 236px;
        padding: 12px 14px;
      }

      .brand h1 {
        margin: 0;
        font-size: 16px;
        font-weight: 750;
        letter-spacing: 0;
      }

      .brand span {
        display: block;
        margin-top: 3px;
        color: rgba(16, 21, 26, 0.62);
        font-size: 12px;
      }

      .toolbar {
        display: flex;
        align-items: center;
        gap: 6px;
        padding: 8px;
      }

      button {
        min-width: 38px;
        min-height: 34px;
        border: 1px solid rgba(48, 63, 78, 0.18);
        border-radius: 6px;
        background: #f8fafb;
        color: #10151a;
        cursor: pointer;
        font: inherit;
        font-size: 13px;
        font-weight: 650;
        padding: 0 11px;
      }

      button:hover,
      button[aria-pressed="true"] {
        border-color: rgba(23, 118, 154, 0.55);
        background: #e8f6fb;
      }

      .readout {
        min-width: 164px;
        padding: 10px 12px;
        color: rgba(16, 21, 26, 0.68);
        font-size: 12px;
        font-variant-numeric: tabular-nums;
      }

      .readout strong {
        display: block;
        margin-bottom: 4px;
        color: #10151a;
        font-size: 13px;
      }

      .asset-strip {
        position: fixed;
        left: 18px;
        right: 18px;
        bottom: 16px;
        display: grid;
        grid-template-columns: repeat(9, minmax(0, 1fr));
        gap: 8px;
        padding: 10px;
      }

      body.walk-mode .asset-strip {
        opacity: 0;
        pointer-events: none;
      }

      .crosshair {
        position: fixed;
        left: 50%;
        top: 50%;
        width: 30px;
        height: 30px;
        opacity: 0;
        pointer-events: none;
        transform: translate(-50%, -50%);
        user-select: none;
      }

      .crosshair::before,
      .crosshair::after {
        position: absolute;
        content: "";
        border-radius: 999px;
        background: rgba(16, 21, 26, 0.82);
        box-shadow:
          0 0 0 1px rgba(255, 255, 255, 0.7),
          0 0 9px rgba(23, 118, 154, 0.34);
      }

      .crosshair::before {
        left: 14px;
        top: 1px;
        width: 2px;
        height: 9px;
        box-shadow:
          0 19px 0 rgba(16, 21, 26, 0.82),
          0 0 0 1px rgba(255, 255, 255, 0.7),
          0 19px 0 1px rgba(255, 255, 255, 0.7),
          0 0 9px rgba(23, 118, 154, 0.34);
      }

      .crosshair::after {
        left: 1px;
        top: 14px;
        width: 9px;
        height: 2px;
        box-shadow:
          19px 0 0 rgba(16, 21, 26, 0.82),
          0 0 0 1px rgba(255, 255, 255, 0.7),
          19px 0 0 1px rgba(255, 255, 255, 0.7),
          0 0 9px rgba(23, 118, 154, 0.34);
      }

      body.walk-mode .crosshair {
        opacity: 1;
      }

      .interaction-tooltip {
        position: fixed;
        left: 50%;
        bottom: 122px;
        min-width: 220px;
        border: 1px solid rgba(48, 63, 78, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.86);
        box-shadow: 0 16px 34px rgba(40, 50, 60, 0.12);
        color: rgba(16, 21, 26, 0.82);
        font-size: 12px;
        font-weight: 700;
        padding: 8px 10px;
        pointer-events: none;
        text-align: center;
        transform: translateX(-50%);
        backdrop-filter: blur(14px);
      }

      .interaction-tooltip[hidden] {
        display: none;
      }

      .hold-track {
        display: block;
        height: 5px;
        margin-top: 7px;
        border-radius: 999px;
        background: rgba(48, 63, 78, 0.14);
        overflow: hidden;
      }

      .hold-fill {
        display: block;
        width: calc(var(--hold-progress, 0) * 100%);
        height: 100%;
        border-radius: inherit;
        background: #38c172;
      }

      .asset-strip span {
        min-width: 0;
        border-left: 3px solid var(--swatch, #8aa0ad);
        border-radius: 5px;
        background: rgba(244, 247, 249, 0.94);
        padding: 7px 8px;
        overflow: hidden;
        color: rgba(16, 21, 26, 0.78);
        font-size: 12px;
        font-weight: 650;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .survival-bars {
        position: fixed;
        left: 18px;
        bottom: 86px;
        display: grid;
        gap: 8px;
        width: 176px;
        pointer-events: none;
      }

      .survival-meter {
        display: grid;
        grid-template-columns: 34px 1fr;
        align-items: center;
        gap: 8px;
      }

      .survival-icon {
        display: grid;
        width: 34px;
        height: 28px;
        place-items: center;
        border: 1px solid rgba(48, 63, 78, 0.14);
        border-radius: 6px;
        background: rgba(255, 255, 255, 0.78);
        color: rgba(16, 21, 26, 0.72);
        font-size: 11px;
        font-weight: 800;
      }

      .survival-track {
        height: 8px;
        border-radius: 999px;
        background: color-mix(in srgb, var(--bar-dark) 22%, #d7dde2);
        overflow: hidden;
        box-shadow: inset 0 0 0 1px rgba(48, 63, 78, 0.12);
      }

      .survival-fill {
        display: block;
        width: calc(var(--value) * 1%);
        height: 100%;
        border-radius: inherit;
        background: linear-gradient(90deg, var(--bar-dark), var(--bar-light));
        box-shadow: 0 0 12px var(--bar-glow);
      }

      .quick-access {
        position: fixed;
        left: 50%;
        bottom: 18px;
        display: grid;
        grid-template-columns: 44px auto 44px;
        align-items: center;
        gap: 8px;
        transform: translateX(-50%);
      }

      .quick-key,
      .hotbar,
      .item-slot {
        border: 1px solid rgba(48, 63, 78, 0.14);
        border-radius: 7px;
        background: rgba(255, 255, 255, 0.82);
        box-shadow: 0 14px 28px rgba(40, 50, 60, 0.1);
        backdrop-filter: blur(14px);
      }

      .quick-key {
        width: 44px;
        height: 38px;
        padding: 0;
      }

      .hotbar,
      .modal-hotbar,
      .inventory-grid {
        display: grid;
        grid-template-columns: repeat(10, 40px);
        gap: 6px;
      }

      .hotbar {
        padding: 6px;
      }

      .item-slot {
        position: relative;
        display: grid;
        width: 40px;
        height: 40px;
        place-items: center;
        color: #10151a;
        font-size: 14px;
        font-weight: 800;
      }

      .item-slot.selected {
        border-color: rgba(23, 118, 154, 0.62);
        background: #e8f6fb;
      }

      .slot-portrait {
        width: 34px;
        height: 34px;
        object-fit: contain;
        pointer-events: none;
      }

      .slot-key,
      .slot-count {
        position: absolute;
        right: 4px;
        bottom: 2px;
        color: rgba(16, 21, 26, 0.56);
        font-size: 9px;
        font-weight: 800;
      }

      .slot-count {
        left: 4px;
        right: auto;
      }

      .modal-backdrop {
        position: fixed;
        inset: 0;
        display: grid;
        place-items: center;
        background: rgba(230, 235, 240, 0.34);
        backdrop-filter: blur(6px);
      }

      .modal-backdrop[hidden] {
        display: none;
      }

      .space-modal {
        width: min(920px, calc(100vw - 32px));
        max-height: min(680px, calc(100vh - 56px));
        border: 1px solid rgba(48, 63, 78, 0.16);
        border-radius: 8px;
        background: rgba(255, 255, 255, 0.94);
        box-shadow: 0 24px 80px rgba(40, 50, 60, 0.28);
        overflow: hidden;
      }

      .inventory-modal {
        width: min(486px, calc(100vw - 32px));
      }

      .inventory-panel,
      .notebook-panel {
        padding: 16px;
      }

      .panel-title {
        margin: 0 0 12px;
        color: #17769a;
        font-size: 14px;
        font-weight: 800;
        letter-spacing: 0.06em;
        text-transform: uppercase;
      }

      .inventory-grid {
        margin-top: 12px;
      }

      .notebook-modal {
        width: min(760px, calc(100vw - 32px));
      }

      .notebook-panel {
        display: grid;
        grid-template-columns: 180px 1fr;
        gap: 16px;
      }

      .notebook-tabs {
        display: grid;
        align-content: start;
        gap: 8px;
      }

      .notebook-tab {
        min-height: 36px;
        text-align: left;
      }

      .notebook-tab.active {
        border-color: rgba(23, 118, 154, 0.62);
        background: #e8f6fb;
      }

      .notebook-page {
        min-height: 300px;
        border: 1px solid rgba(48, 63, 78, 0.12);
        border-radius: 7px;
        background: rgba(244, 247, 249, 0.78);
        padding: 16px;
      }

      .notebook-page p {
        margin: 0 0 12px;
        color: rgba(16, 21, 26, 0.72);
        line-height: 1.5;
      }

      .error {
        position: fixed;
        right: 18px;
        top: 84px;
        max-width: min(520px, calc(100vw - 36px));
        border: 1px solid rgba(180, 38, 38, 0.35);
        border-radius: 8px;
        background: rgba(255, 246, 246, 0.94);
        box-shadow: 0 16px 34px rgba(80, 20, 20, 0.12);
        padding: 10px 12px;
        color: #7d1111;
        font-size: 12px;
        white-space: pre-wrap;
      }

      @media (max-width: 820px) {
        .topbar {
          align-items: flex-start;
          flex-direction: column;
        }

        .brand,
        .toolbar,
        .readout {
          width: min(100%, 360px);
        }

        .toolbar {
          flex-wrap: wrap;
        }

        .asset-strip {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }

        .quick-access {
          width: calc(100vw - 20px);
          grid-template-columns: 40px 1fr 40px;
        }

        .hotbar,
        .modal-hotbar,
        .inventory-grid {
          grid-template-columns: repeat(10, minmax(0, 1fr));
        }

        .item-slot {
          width: auto;
          height: 36px;
        }

        .survival-bars {
          bottom: 76px;
          width: 156px;
        }
      }
    </style>
  </head>
  <body>
    <canvas id="studio-canvas" aria-label="Spaceraft ship development studio"></canvas>
    <div class="topbar">
      <section class="brand">
        <h1>Ship Development Studio</h1>
        <span id="studio-status">Loading assets</span>
      </section>
      <nav class="toolbar" aria-label="Studio camera controls">
        <button type="button" data-view="home" title="Home view">Home</button>
        <button type="button" data-view="front" title="Front view">Front</button>
        <button type="button" data-view="side" title="Side view">Side</button>
        <button type="button" data-view="top" title="Top view">Top</button>
        <button id="spin-toggle" type="button" aria-pressed="false" title="Turntable">
          Spin
        </button>
        <button id="walk-toggle" type="button" aria-pressed="false" title="Walk mode">
          Walk
        </button>
        <button id="labels-toggle" type="button" aria-pressed="true" title="Labels">
          Labels
        </button>
      </nav>
      <section class="readout">
        <strong>Studio</strong>
        <span id="studio-readout">Meshes 0</span>
      </section>
    </div>
    <section id="asset-strip" class="asset-strip" aria-label="Loaded assets"></section>
    <div class="crosshair" aria-hidden="true"></div>
    <div id="interaction-tooltip" class="interaction-tooltip" hidden></div>
    <div class="survival-bars" aria-label="Survival status"></div>
    <div class="quick-access" aria-label="Quick access">
      <button id="inventory-key-button" class="quick-key" type="button">
        TAB
      </button>
      <div id="hotbar" class="hotbar" aria-label="Hotbar"></div>
      <button id="notebook-key-button" class="quick-key" type="button">
        T
      </button>
    </div>
    <div
      id="inventory-modal"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="inventory-title"
      hidden
    >
      <section class="space-modal inventory-modal">
        <section class="inventory-panel">
          <h2 class="panel-title">Hotbar</h2>
          <div class="modal-hotbar" aria-label="Inventory hotbar"></div>
          <h2 id="inventory-title" class="panel-title">Inventory</h2>
          <div class="inventory-grid" aria-label="Inventory grid"></div>
        </section>
      </section>
    </div>
    <div
      id="notebook-modal"
      class="modal-backdrop"
      role="dialog"
      aria-modal="true"
      aria-labelledby="notebook-title"
      hidden
    >
      <section class="space-modal notebook-modal">
        <div class="notebook-panel">
          <nav class="notebook-tabs" aria-label="Notebook sections"></nav>
          <section class="notebook-page">
            <h2 id="notebook-title" class="panel-title">Notebook</h2>
            <div class="notebook-copy"></div>
          </section>
        </div>
      </section>
    </div>
    <div id="runtime-error" class="error" hidden></div>
    <script
      src="https://cdn.babylonjs.com/babylon.js"
      crossorigin="anonymous"
    ></script>
    <script
      src="https://cdn.babylonjs.com/loaders/babylonjs.loaders.min.js"
      crossorigin="anonymous"
    ></script>
    <script type="module" src="./src/ship-development-studio.js"></script>
  </body>
</html>
